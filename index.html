<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BULLPRINT 3D</title>
<meta name="description" content="Bullprint 3D — Atelier d'impression 3D">
<meta property="og:type" content="website">
<meta property="og:locale" content="fr_FR">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;500;600&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="cursor"></div>
<div class="cursor-dot"></div>

<!-- ============ INTRO ============ -->
<div class="intro">
  <div class="intro-meta">
    <span><span class="blink"></span>BULLPRINT 3D · CHARGEMENT</span>
    <span>MMXXVI · ATELIER</span>
  </div>
  <div class="print-stage"></div>
  <div class="intro-progress">
    <span>IMPRESSION EN COURS</span>
    <div class="progress-bar"></div>
    <span class="progress-pct">000%</span>
  </div>
</div>

<!-- ============ TOPBAR ============ -->
<header class="topbar">
  <a href="#" class="brand" style="text-decoration:none;color:inherit">
    <div class="brand-mark"></div>
    <div class="brand-text">
      <span data-bind="brand.name">BULLPRINT</span>
      <span class="sub" data-bind="brand.sub">3D · ATELIER</span>
    </div>
  </a>
  <nav class="nav" data-bind="nav"></nav>
  <a href="#order" class="nav-cta"><span data-bind="navCta">Devis →</span></a>
</header>

<!-- ============ STATUS BAR ============ -->
<div class="status-bar">
  <div class="status-track" data-bind="statusBar"></div>
</div>

<!-- ============ HERO ============ -->
<section class="hero">
  <div class="hero-rail" data-bind="hero.rail"></div>

  <div>
    <div class="hero-eyebrow" data-bind="hero.eyebrow">
      <span class="live"></span>
      <span class="eyebrow-text"></span>
    </div>
    <h1 data-bind="hero.title"></h1>
    <p class="hero-lede" data-bind="hero.lede"></p>
    <div class="hero-cta">
      <a class="btn btn-primary" data-bind="hero.ctaPrimary"><span class="label"></span> <span class="arrow">→</span></a>
      <a class="btn btn-ghost" data-bind="hero.ctaGhost"><span class="label"></span></a>
      <a target="_blank" class="ig-icon" data-bind="site.instagramUrl" aria-label="Instagram">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
          <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
          <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
        </svg>
        <span class="ig-label" data-bind="site.instagramHandle"></span>
      </a>
    </div>
  </div>

  <div class="hero-card">
    <span class="bracket tl"></span>
    <span class="bracket tr"></span>
    <span class="bracket bl"></span>
    <span class="bracket br"></span>
    <div class="scan-line"></div>
    <img class="product-img" data-bind="hero.featuredCard.image" alt="">
    <div class="hero-card-meta">
      <span class="hc-tag" data-bind="hero.featuredCard.tag"></span>
      <span class="hc-num" data-bind="hero.featuredCard.num"></span>
    </div>
    <div class="hero-card-foot">
      <h3 data-bind="hero.featuredCard.title"></h3>
      <div class="meta-row">
        <span data-bind="hero.featuredCard.meta"></span>
      </div>
    </div>
  </div>
</section>

<!-- ============ GALLERY ============ -->
<section class="gallery" id="galerie">
  <div class="section-head reveal cascade">
    <div>
      <div class="section-num"><em data-bind="gallery.sectionNum">02 /</em><span data-bind="gallery.sectionLabel"></span></div>
      <h2 data-bind="gallery.title"></h2>
    </div>
    <div class="meta" data-bind="gallery.meta"></div>
  </div>

  <div class="cat-stack" data-bind="gallery.categories"></div>
</section>

<!-- ============ L'ATELIER ============ -->
<section class="atelier" id="atelier">
  <div class="atelier-inner reveal cascade">
    <div class="section-num"><em data-bind="atelier.sectionNum">03 /</em><span data-bind="atelier.sectionLabel"></span></div>
    <h2 class="atelier-title" data-bind="atelier.title"></h2>

    <div class="atelier-grid">
      <div class="atelier-text" data-bind="atelier.paragraphs"></div>
      <div class="atelier-stack" data-bind="atelier.postes"></div>
    </div>

    <p class="atelier-foot">
      <span data-bind="atelier.footNote"></span>
      <a target="_blank" data-bind="site.instagramUrl"><span data-bind="site.instagramHandle"></span> →</a>
    </p>
  </div>
</section>

<!-- ============ CUSTOM ============ -->
<section class="custom" id="custom">
  <div class="custom-inner reveal">
    <div>
      <div class="section-num"><em data-bind="custom.sectionNum">04 /</em><span data-bind="custom.sectionLabel"></span></div>
      <h2 data-bind="custom.title"></h2>
      <p data-bind="custom.paragraph"></p>
      <div class="custom-cta">
        <a href="#order" class="btn btn-primary" data-bind="custom.ctaPrimary"><span class="label"></span> <span class="arrow">→</span></a>
        <a target="_blank" class="btn btn-ghost" data-bind="custom.ctaGhost"><span class="label"></span></a>
      </div>
    </div>
    <div class="steps" data-bind="custom.steps"></div>
  </div>
</section>

<!-- ============ ORDER ============ -->
<section class="order reveal cascade" id="order">
  <div class="section-num" style="justify-content:center"><em data-bind="order.sectionNum">05 /</em><span data-bind="order.sectionLabel"></span></div>
  <h2 data-bind="order.title"></h2>
  <p data-bind="order.paragraph"></p>
  <div class="order-cta">
    <a class="btn btn-primary" data-bind="order.ctaPrimary"><span class="label"></span> <span class="arrow">→</span></a>
    <a target="_blank" class="btn btn-ghost" data-bind="order.ctaGhost"><span class="label"></span></a>
  </div>
  <div class="order-handles" data-bind="order.handles"></div>
</section>

<!-- ============ FOOTER ============ -->
<footer>
  <div class="foot">
    <div class="foot-brand">
      <div class="brand">
        <div class="brand-mark"></div>
        <div class="brand-text">
          <span data-bind="brand.name">BULLPRINT</span>
          <span class="sub" data-bind="brand.sub">3D · ATELIER</span>
        </div>
      </div>
      <p data-bind="footer.tagline"></p>
    </div>
    <div data-bind="footer.columns" style="display:contents"></div>
  </div>
  <div class="foot-bottom">
    <div data-bind="footer.copyright"></div>
    <div class="sig" data-bind="footer.signature"></div>
  </div>
</footer>

<script src="render.js"></script>
<script src="script.js"></script>
</body>
</html>
